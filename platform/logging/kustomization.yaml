  #     customConfig:
  #       sources:
  #         talos_kernel_logs:
  #           address: 127.0.0.1:6050
  #           type: socket
  #           mode: tcp
  #           max_length: 102400
  #           decoding:
  #             codec: json
  #         talos_service_logs:
