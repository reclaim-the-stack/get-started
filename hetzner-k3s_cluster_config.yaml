# Example cluster for Reclaim the Stack on Hetzner Cloud
# brew install kubectl helm yq
# brew install vitobotta/tap/hetzner_k3s
# hetzner-k3s create --config hetzner-k3s_cluster_config.yaml

# hetzner_token: <HETZNER-TOKEN> # recommend using HCLOUD_TOKEN instead
cluster_name: reclaim-the-stack
kubeconfig_path: ./kubeconfig  # or /cluster/kubeconfig if you are going to use Docker
k3s_version: v1.36.2+k3s1
protect_against_deletion: false

networking:
  ssh:
    port: 22
    use_agent: false
    public_key_path: ~/.ssh/id_ed25519.pub
    private_key_path: ~/.ssh/id_ed25519
  allowed_networks:
    ssh:
      - 0.0.0.0/0
    api:
      - 0.0.0.0/0

masters_pool:
  instance_type: cpx22
  instance_count: 1
  locations:
    - hel1

worker_node_pools:
  - name: workers
    instance_type: cpx22
    instance_count: 3
    location: hel1
    # labels:
    #   - key: node-role.kubernetes.io/worker
    #     value: ""
  - name: databases
    instance_type: cpx32
    instance_count: 3
    location: hel1
    # labels:
    #   - key: node-role.kubernetes.io/database
    #     value: ""
    taints:
      - key: role
        value: database
        effect: NoSchedule
